name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_path:
        description: Server directory to deploy dist files
        required: false
        default: /var/www/diverge

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production

    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
      SSH_USER: ${{ secrets.SSH_USER }}
      DEPLOY_PATH: ${{ inputs.deploy_path || vars.DEPLOY_PATH || '/var/www/diverge' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate deployment configuration
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          required_vars=(SSH_HOST SSH_USER SSH_PRIVATE_KEY DEPLOY_PATH)
          for required_var in "${required_vars[@]}"; do
            if [ -z "${!required_var}" ]; then
              echo "$required_var is required."
              exit 1
            fi
          done

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Prepare deploy directory
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "mkdir -p '$DEPLOY_PATH'"

      - name: Sync dist to server
        run: |
          rsync -az --delete \
            -e "ssh -i $HOME/.ssh/deploy_key -p $SSH_PORT" \
            dist/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
