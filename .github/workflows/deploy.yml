name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_path:
        description: Server directory to deploy dist files
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production

    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
      SSH_USER: ${{ secrets.SSH_USER }}
      DEPLOY_PATH: ${{ inputs.deploy_path || vars.DEPLOY_PATH || secrets.DEPLOY_PATH || '/var/www/diverge' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate deployment configuration
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          required_vars=(SSH_HOST SSH_USER SSH_PRIVATE_KEY DEPLOY_PATH)
          for required_var in "${required_vars[@]}"; do
            if [ -z "${!required_var}" ]; then
              echo "$required_var is required."
              exit 1
            fi
          done
          case "$DEPLOY_PATH" in
            /*) ;;
            *)
              echo "DEPLOY_PATH must be an absolute path."
              exit 1
              ;;
          esac
          if [ "$DEPLOY_PATH" = "/" ]; then
            echo "DEPLOY_PATH must not be /."
            exit 1
          fi

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Upload dist archive
        env:
          ARCHIVE_NAME: diverge-dist-${{ github.run_id }}.tar.gz
        run: |
          tar -C dist -czf "$ARCHIVE_NAME" .
          scp -i "$HOME/.ssh/deploy_key" -P "$SSH_PORT" \
            "$ARCHIVE_NAME" "$SSH_USER@$SSH_HOST:/tmp/$ARCHIVE_NAME"

      - name: Deploy dist archive
        env:
          ARCHIVE_NAME: diverge-dist-${{ github.run_id }}.tar.gz
        run: |
          printf -v quoted_deploy_path '%q' "$DEPLOY_PATH"
          printf -v quoted_archive_path '%q' "/tmp/$ARCHIVE_NAME"
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "bash -se -- $quoted_deploy_path $quoted_archive_path" <<'DEPLOY_SCRIPT'
          deploy_path=$1
          archive_path=$2

          echo "Deploying to $deploy_path"
          mkdir -p "$deploy_path"
          find "$deploy_path" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf "$archive_path" -C "$deploy_path"
          rm -f "$archive_path"
          test -f "$deploy_path/index.html"
          echo "Deployed files:"
          find "$deploy_path" -maxdepth 2 -type f | sort | head -20
          DEPLOY_SCRIPT
